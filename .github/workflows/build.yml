name: Build

on:
  push:
    branches: [main, ci-build-workflow]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERMINAL_PROGRESS_WIDTH: 0

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-tauri-ubuntu:
    name: Build Tauri App (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v0
        with:
          components: rustfmt, clippy

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-ubuntu
          path: |
            src-tauri/target/release/bundle/**
            !src-tauri/target/release/build/**
            !src-tauri/target/release/deps/**

  build-tauri-windows:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v0

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles msi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-windows
          path: |
            src-tauri/target/release/bundle/**
            !src-tauri/target/release/build/**
            !src-tauri/target/release/deps/**

  release:
    name: Create Release
    needs: [build-tauri-ubuntu, build-tauri-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe artifacts/**/*.msi artifacts/**/*.deb
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
